global
    daemon
    log stdout local0
    log stdout local1 notice
    maxconn 4096
    tune.ssl.default-dh-param 2048

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 5s
    timeout client  50s
    timeout server  50s

# HTTP frontend (redirects to HTTPS)
frontend http_front
    bind *:80
    mode http
    default_backend http_backend

backend http_backend
    mode http
    server nginx-http 127.0.0.1:8080 check

# HTTPS/gRPC frontend
frontend grpc_front
    bind *:443 ssl crt /etc/haproxy/certs/selfsigned.pem
    mode tcp
    default_backend grpc_backend

# gRPC Backend routing
backend grpc_backend
    mode tcp
    balance roundrobin
    
    # User Service
    acl is_user_service req.ssl_sni user.service.local || req.path /user.UserService/
    use_backend user_backend if is_user_service

    # Producer Service
    acl is_producer_service req.ssl_sni producer.service.local || req.path /producer.ProducerService/
    use_backend producer_backend if is_producer_service

    # Parcel Service
    acl is_parcel_service req.ssl_sni parcel.service.local || req.path /parcel.ParcelService/
    use_backend parcel_backend if is_parcel_service

    # Production Service
    acl is_production_service req.ssl_sni production.service.local || req.path /production.ProductionService/
    use_backend production_backend if is_production_service

    # Alert Service
    acl is_alert_service req.ssl_sni alert.service.local || req.path /alert.AlertService/
    use_backend alert_backend if is_alert_service

    # Notification Service
    acl is_notification_service req.ssl_sni notification.service.local || req.path /notification.NotificationService/
    use_backend notification_backend if is_notification_service

    # Report Service
    acl is_report_service req.ssl_sni report.service.local || req.path /report.ReportService/
    use_backend report_backend if is_report_service

    # Default backend
    default_backend user_backend

# User Service Backend
backend user_backend
    mode tcp
    balance roundrobin
    server user-srv user-service:50051 check inter 10s

# Producer Service Backend
backend producer_backend
    mode tcp
    balance roundrobin
    server producer-srv producer-service:50052 check inter 10s

# Parcel Service Backend
backend parcel_backend
    mode tcp
    balance roundrobin
    server parcel-srv parcel-service:50053 check inter 10s

# Production Service Backend
backend production_backend
    mode tcp
    balance roundrobin
    server production-srv production-service:50054 check inter 10s

# Alert Service Backend
backend alert_backend
    mode tcp
    balance roundrobin
    server alert-srv alert-service:50055 check inter 10s

# Notification Service Backend
backend notification_backend
    mode tcp
    balance roundrobin
    server notification-srv notification-service:50056 check inter 10s

# Report Service Backend
backend report_backend
    mode tcp
    balance roundrobin
    server report-srv report-service:50057 check inter 10s

# Stats API
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats show-legends
    stats show-node
